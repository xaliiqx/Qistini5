<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قسطني</title>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
/* ═══════════ إعدادات عامة ═══════════ */
:root{
  --sky1:#073B5C; --sky2:#0A5480; --sky3:#1276A8; --skyBg:#E5F2FA;
  --beige:#F4E3CE; --beigeDk:#E5CFA8; --brown1:#6B3D1E; --brown2:#A87040;
  --white:#FFFFFF; --text:#0B1E2D; --sub:#4A6E88; --border:#C0DCF0;
  --green:#167A45; --red:#C02828; --orange:#C86010;
  --sh:0 2px 14px rgba(7,59,92,0.10); --shH:0 8px 28px rgba(7,59,92,0.20);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Tahoma,'Segoe UI',Arial,sans-serif;background:var(--skyBg);color:var(--text);direction:rtl;min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--sky3);border-radius:9px}
input,select,textarea,button{font-family:inherit}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--sky3)!important}
a{text-decoration:none}
.hidden{display:none!important}

/* شعار */
@keyframes coinSpin{0%{transform:perspective(500px) rotateY(0deg)}100%{transform:perspective(500px) rotateY(360deg)}}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 6px #1276A888)}50%{filter:drop-shadow(0 0 16px #1276A8cc)}}
.logo{animation:coinSpin 5s linear infinite, glow 3s ease-in-out infinite}

/* واتساب عائم */
@keyframes wab{0%,100%{transform:scale(1)}50%{transform:scale(1.13)}}
.wa-float{position:fixed;bottom:22px;left:22px;z-index:999;width:58px;height:58px;background:#25D366;border-radius:999px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px #25D36660}
.wa-float svg{animation:wab 2.5s ease-in-out infinite}

/* نافبار */
nav{background:var(--white);border-bottom:1px solid var(--border);box-shadow:0 2px 10px rgba(7,59,92,.08);position:sticky;top:0;z-index:50}
.nav-inner{max-width:1200px;margin:0 auto;padding:12px 16px}
.nav-brand{display:flex;align-items:center;gap:12px;margin-bottom:12px;cursor:pointer}
.nav-brand b{font-weight:900;font-size:21px;color:var(--sky1)}
.nav-brand span{font-size:11px;color:var(--sub)}
.nav-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.nav-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 6px;border-radius:12px;border:1.5px solid var(--border);cursor:pointer;font-weight:800;font-size:13px;background:var(--skyBg);color:var(--text);min-height:56px}
.nav-btn.active{border:none;background:linear-gradient(135deg,var(--sky3),var(--sky1));color:#fff}
.nav-btn .ic{font-size:19px}

main{max-width:1200px;margin:0 auto;padding:26px 16px 10px}

/* كروت وأزرار */
.card{background:var(--white);border-radius:16px;border:1px solid var(--border);box-shadow:var(--sh);padding:20px}
.card.hover:hover{box-shadow:var(--shH);transform:translateY(-3px)}
.btn{display:inline-flex;align-items:center;gap:7px;justify-content:center;padding:12px 22px;border-radius:11px;font-weight:700;font-size:15px;cursor:pointer;border:none;transition:transform .15s}
.btn:hover{transform:scale(1.02)}
.btn-solid{background:linear-gradient(135deg,var(--sky3),var(--sky1));color:#fff}
.btn-outline{background:transparent;color:var(--sky1);border:1.5px solid var(--sky1)}
.btn-beige{background:linear-gradient(135deg,var(--beige),var(--beigeDk));color:var(--brown1)}
.btn-danger{background:#C0282815;color:var(--red);border:1px solid #C0282844}
.btn-green{background:#167A4518;color:var(--green);border:1px solid #167A4544}
.btn-wa{background:#25D366;color:#fff}
.btn-ghost{background:var(--skyBg);color:var(--sky1);border:1px solid var(--border)}
.btn.sm{padding:8px 14px;font-size:13px}
input[type=text],input[type=password],input[type=number],input[type=date],select,textarea{width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--skyBg);color:var(--text);font-size:15px}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:13px;color:var(--sub);font-weight:700;margin-bottom:6px}
.badge{display:inline-block;padding:4px 11px;border-radius:999px;font-size:12px;font-weight:700}
.badge-sky{color:var(--sky1);background:var(--skyBg)}
.badge-green{color:var(--green);background:#167A4518}
.badge-red{color:var(--red);background:#C0282818}
.badge-orange{color:var(--orange);background:#C8601018}
.badge-beige{color:var(--brown1);background:var(--beige)}
.page-title{margin-bottom:22px}
.page-title h2{font-size:23px;font-weight:900}
.page-title p{font-size:14px;color:var(--sub);margin-top:6px}

/* الهيرو */
.hero{background:linear-gradient(135deg,var(--sky1) 0%,var(--sky2) 55%,var(--sky3) 100%);border-radius:18px;margin-bottom:24px;padding:36px 26px;position:relative;overflow:hidden;box-shadow:var(--sh);color:#fff}
.hero h1{font-size:27px;font-weight:900;margin:12px 0 10px;line-height:1.45}
.hero p{color:#ffffffbb;font-size:14px;margin-bottom:20px;line-height:1.8;max-width:520px}
.founder-quote{text-align:center;padding:13px 20px;background:linear-gradient(90deg,var(--beige),var(--beigeDk),var(--beige));border-radius:12px;margin-bottom:24px;font-size:14px;font-weight:700;color:var(--brown1)}

/* منتجات */
.cats{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.cat-btn{padding:8px 17px;border-radius:999px;border:1.5px solid var(--border);background:var(--white);font-weight:700;font-size:13px;cursor:pointer}
.cat-btn.active{background:var(--sky1);color:#fff;border-color:var(--sky1)}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}
.pcard{background:var(--white);border-radius:14px;border:1px solid var(--border);overflow:hidden;cursor:pointer;box-shadow:var(--sh);transition:all .2s}
.pcard:hover{transform:translateY(-4px);box-shadow:var(--shH)}
.pcard img{width:100%;height:150px;object-fit:cover;background:var(--skyBg)}
.pcard .body{padding:13px 15px}
.pcard .cat{font-size:11px;color:var(--sub);margin-bottom:3px}
.pcard .name{font-weight:800;font-size:14px;margin-bottom:9px}
.pcard .row{display:flex;justify-content:space-between;align-items:center}

/* مودال */
.modal-overlay{position:fixed;inset:0;background:#00000075;z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--white);border-radius:18px;max-width:540px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 20px 50px rgba(7,59,92,.35)}
.modal img{width:100%;height:200px;object-fit:cover;border-radius:18px 18px 0 0}
.modal-close{position:absolute;top:12px;left:12px;background:#000a;border:none;border-radius:999px;width:34px;height:34px;color:#fff;cursor:pointer;font-size:17px}
.modal-body{padding:22px}

/* واتساب دردشة */
.wa-chat{background:#111B21;border-radius:16px;overflow:hidden;box-shadow:var(--sh)}
.wa-head{background:#1F2C34;padding:13px 16px;display:flex;align-items:center;gap:10px}
.wa-msgs{background:#0A1014;height:300px;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.wa-bubble{padding:9px 13px;border-radius:13px 13px 13px 2px;font-size:13px;line-height:1.8;white-space:pre-wrap;max-width:80%;color:#E9EDEF;background:#1F2C34}
.wa-bubble.me{border-radius:13px 13px 2px 13px;background:#005C4B;margin-right:auto;margin-left:0}
.wa-input-row{background:#1F2C34;padding:10px 12px;display:flex;gap:8px;align-items:center}
.wa-input-row input{flex:1;background:#2A3942;border:none;border-radius:999px;padding:9px 14px;color:#E9EDEF;font-size:13px}
.wa-send{width:38px;height:38px;background:#00A884;border-radius:999px;border:none;cursor:pointer;font-size:16px;color:#fff}

/* أدمن */
.admin-menu{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
.admin-menu button{display:flex;align-items:center;gap:6px;padding:10px 14px;border-radius:10px;border:none;cursor:pointer;font-weight:700;font-size:13px;white-space:nowrap;flex-shrink:0;background:var(--skyBg);color:var(--text)}
.admin-menu button.active{background:linear-gradient(135deg,var(--sky3),var(--sky1));color:#fff}
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:4px}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
.list-row{display:flex;align-items:center;gap:9px;padding:9px 12px;border:1px solid var(--border);border-radius:11px;background:var(--skyBg);margin-bottom:8px}
.list-row img{width:42px;height:42px;border-radius:9px;object-fit:cover;background:var(--beige);flex-shrink:0}
.icon-btn{background:none;border:none;cursor:pointer;font-size:16px}

.theme-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:8px}
.theme-opt{padding:12px 8px;border-radius:12px;border:1.5px solid var(--border);cursor:pointer;font-weight:700;font-size:12px;background:var(--white)}
.theme-opt.active{border:2.5px solid var(--sky1)}
.theme-opt .swatch{width:100%;height:26px;border-radius:7px;margin-bottom:6px}

footer{background:var(--sky1);color:#fff;padding:26px 20px;text-align:center;margin-top:40px}

/* عقد الشراء */
.cd-line{font-size:14.5px;line-height:2.3;margin:2px 0}
.cd-blank{display:inline-block;min-width:100px;border-bottom:1.5px solid var(--text);padding:0 6px 1px;font-weight:700;text-align:center}
.cd-terms{margin:0;padding-inline-start:20px;font-size:13px;color:var(--sub);line-height:2}
.cd-sign{display:flex;justify-content:space-between;gap:20px;margin-top:26px;flex-wrap:wrap}
.cd-sign div{flex:1;min-width:140px;text-align:center;padding-top:30px;border-top:1px solid var(--text);font-size:12.5px;color:var(--sub)}
.cd-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--skyBg)}
.doc-upload-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media (max-width:520px){.doc-upload-grid{grid-template-columns:1fr}}
.doc-upload-item{border:1.5px dashed var(--border);border-radius:12px;padding:10px;background:var(--skyBg)}
.doc-upload-item label{display:block;font-size:12px;font-weight:700;margin-bottom:6px}
.doc-preview{width:100%;height:100px;border-radius:9px;background:var(--white);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:11px;color:var(--sub);margin-bottom:6px}
.doc-preview img{width:100%;height:100%;object-fit:cover}
.ledger-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px}
.ledger-table th{background:var(--skyBg);padding:7px 5px;border:1px solid var(--border);font-size:11px}
.ledger-table td{padding:7px 5px;border:1px solid var(--border);text-align:center}
@media print{
  nav,footer,.wa-float,.admin-menu,.no-print{display:none!important}
  main{padding:0;max-width:100%}
  body{background:#fff!important}
}
</style>
</head>

function loadState(cb){
  if (useFirebase) {
    db.collection("qistini").doc("main").get().then(doc=>{

      else { saveState(); }
      cb();

  } else {

  }
}

function fmt(n){ return Math.round(n||0).toLocaleString("ar-IQ") + " د.ع"; }
function waHref(num, txt){ return `https://wa.me/964${String(num).replace(/^0/,"")}?text=${encodeURIComponent(txt)}`; }
function autoReplyText(){ return `أهلاً وسهلاً بيك بـ ${state?.info?.name || "شركة قسطني"} 🌟\nسيجيبك الموظف المختص بعد قليل.\nشكراً على انتظارك 🙏`; }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function daysUntil(dateStr){ if(!dateStr) return null; const d1=new Date(todayISO()), d2=new Date(dateStr); return Math.round((d2-d1)/86400000); }
function esc(s){ return String(s||"").replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function fmtDateAr(iso){ if(!iso) return "—"; const [y,m,d]=iso.split("-"); return `${d}/${m}/${y}`; }
function arabicWeekday(iso){ if(!iso) return "—"; const d=new Date(iso+"T00:00:00"); return WEEKDAYS_AR[d.getDay()]; }
function addMonthsIso(iso, n){ if(!iso) return ""; const d=new Date(iso+"T00:00:00"); d.setMonth(d.getMonth()+n); return d.toISOString().slice(0,10); }
function compressImage(file, maxDim, quality){
  maxDim = maxDim||900; quality = quality||0.6;
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        let w=img.width, h=img.height;
        if(w>h){ if(w>maxDim){ h=h*(maxDim/w); w=maxDim; } } else { if(h>maxDim){ w=w*(maxDim/h); h=maxDim; } }
        const canvas=document.createElement("canvas");
        canvas.width=w; canvas.height=h;
        canvas.getContext("2d").drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror=reject;
      img.src=e.target.result;
    };
    reader.onerror=reject;
    reader.readAsDataURL(file);
  });
}

function ensureInstallments(sub){
  const n = sub.months||0;
  if(!Array.isArray(sub.installments)) sub.installments = [];
  if(sub.installments.length !== n){
    const old = sub.installments;
    sub.installments = Array.from({length:n}, (_,i)=> old[i] || {n:i+1, receiver:"قسطني", payer:sub.name, date:"", amount:0, status:"pending"});
  }
  sub.installments.forEach(it=>{ if(!it.payer) it.payer = sub.name; });
}
function recomputeSubPaid(sub){
  const paidInstallments = (sub.installments||[]).filter(it=>it.status==="paid").reduce((s,it)=>s+(Number(it.amount)||0),0);
  sub.paid = (sub.downPayment||0) + paidInstallments;
}
function updateInstallment(subId, n, field, value){
  const sub = state.subs.find(s=>s.id===subId);
  if(!sub) return;
  ensureInstallments(sub);
  const item = sub.installments.find(x=>x.n===n);
  if(!item) return;
  if(field==="amount") item.amount = Number(value)||0;
  else if(field==="date") item.date = value;
  else if(field==="receiver") item.receiver = value;
  else if(field==="payer") item.payer = value;
  else if(field==="status") item.status = value;
  recomputeSubPaid(sub);
  saveState(); render();
}

  const code=document.getElementById("asCode").value.trim();
  const name=document.getElementById("asName").value.trim();
  if(!code||!name) return;
  const data={ code, name, wa:document.getElementById("asWa").value.trim(), product:document.getElementById("asProduct").value,
    total:Number(document.getElementById("asTotal").value)||0, months:Number(document.getElementById("asMonths").value),
    paid:Number(document.getElementById("asPaid").value)||0, next:document.getElementById("asNext").value,
    guarantorName:document.getElementById("asGName").value.trim(), guarantorPhone:document.getElementById("asGPhone").value.trim() };
  if (editingSubId){ const i=state.subs.findIndex(s=>s.id===editingSubId); state.subs[i]={...state.subs[i], ...data}; editingSubId=null; }
  else state.subs.push({...data, id:"s"+Date.now()});
  saveState(); render();
}
function editSub(id){ editingSubId=id; render(); }
function cancelEditSub(){ editingSubId=null; render(); }
function deleteSub(id){ state.subs=state.subs.filter(s=>s.id!==id); saveState(); render(); }

function saveSubContract(){
  const sub = state.subs.find(s=>s.id===contractSelSubId);
  if(!sub) return;
  sub.cashPrice = Number(document.getElementById("cdCashPrice").value)||0;
  sub.downPayment = Number(document.getElementById("cdDown").value)||0;
  sub.downPaymentDate = document.getElementById("cdDownDate").value;
  sub.startDate = document.getElementById("cdStart").value;
  sub.guarantorName = document.getElementById("cdGuarantorName").value.trim() || GUARANTOR_NAME;
  sub.guarantorPhone = document.getElementById("cdGuarantorPhone").value.trim();
  sub.notes = document.getElementById("cdNotes").value.trim();
  saveState(); render();
}
function handleDocUpload(e, field){
  const file = e.target.files[0];
  if(!file) return;
  const sub = state.subs.find(s=>s.id===contractSelSubId);
  if(!sub) return;
  compressImage(file, 900, 0.6).then(dataUrl=>{
    sub[field] = dataUrl;
    saveState(); render();
  }).catch(()=>{ alert("تعذّر معالجة الصورة، حاول بصورة أخرى"); });
}

function renderAMsgs(){
  const sub = state.subs.find(s=>s.id===msgSelSubId);
  const dLeft = sub ? daysUntil(sub.next) : null;
  const suggestedType = dLeft!==null && dLeft<0 ? "warn" : "remind";
  const effType = msgSelType==="auto" ? (sub?suggestedType:"remind") : msgSelType;
  const monthly = sub && sub.months ? Math.round((sub.total-(sub.downPayment||0))/sub.months) : 0;
  const guarantorName = sub ? (sub.guarantorName||GUARANTOR_NAME) : GUARANTOR_NAME;
  const rcptAmount = sub ? (document.getElementById("rcptAmount")?.value || monthly) : "";
  const rcptDate = sub ? (document.getElementById("rcptDate")?.value || todayISO()) : todayISO();
  const remainingAfter = sub ? Math.max(0, sub.total - sub.paid) : 0;
  const templates = {
    remind: sub ? `السلام عليكم\n${sub.name}، يسعدنا انضمامك الى قسطني .\nنود تذكيرك بأن موعد استحقاق القسط القادم\nهو يوم ${arabicWeekday(sub.next)} المصادف ${fmtDateAr(sub.next)}، وقيمة القسط ${fmt(monthly)}.\nلضمان استمرار الخدمة وتجنب أي غرامات تأخير، يمكنك سداد القسط كاش عن طريق الكفيل [ ${guarantorName} ] او إلكترونياً بكل سهولة وأمان عبر ماستر كارد الرافدين\n[ ${MASTERCARD_NUMBER} ]\nفي حال وجود أي استفسار أو لطلب المساعدة،\nفريقنا جاهز لخدمتك عبر:\nواتساب: [ ${SUPPORT_WA_DISPLAY} ]\n(إذا قمت بالسداد مؤخراً، يرجى تجاهل هذه الرسالة).\nقسطني .` : "اختر مشتركاً أولاً لتوليد رسالة التذكير الخاصة به.",
    warn: `تنبيه هام من شركة ${state.info.name} ⚠️\nعزيزنا ${sub?sub.name:"العميل الكريم"}،\nمر وقت على موعد استحقاق قسط (${sub?sub.product:"..."}) ولم نستلم الدفعة بعد.\nنرجو المبادرة بالتسديد لتجنب أي إجراءات.\nللتواصل: ${WA_NUM.replace("964","0")}`,
    receipt: sub ? `مرحباً ${sub.name}،\nنؤكد لكم في قسطني استلام مبلغ وقدره ${fmt(Number(rcptAmount)||0)} بتاريخ ${fmtDateAr(rcptDate)}.\nبناءً عليه، أصبح الرصيد المتبقي من القسط هو ${fmt(remainingAfter)}.\nنشكر لكم التزامكم. في حال كان لديكم أي استفسار، لا تترددوا في التواصل معنا عبر الواتساب [ ${SUPPORT_WA_DISPLAY} ].\nشكراً لثقتكم بنا.\nقسطني .` : "اختر مشتركاً أولاً لتوليد إيصال الاستلام.",
    welcome: autoReplyText(),
  };
  const txt = templates[effType];
  const link = sub ? waHref(sub.wa, txt) : `https://wa.me/${WA_NUM}?text=${encodeURIComponent(txt)}`;
  const typeLabels = {auto:"🔄 تلقائي حسب الاستحقاق", remind:"🔔 تذكير", warn:"⚠️ تحذير تأخير", receipt:"🧾 إيصال استلام دفعة", welcome:"👋 ترحيب"};
  return `
    <div class="card">
      <div style="font-weight:800;margin-bottom:6px;font-size:16px">📨 إرسال رسائل واتساب</div>
      <p style="color:var(--sub);font-size:13px;margin-bottom:18px">اختر مشتركاً ونوع الرسالة، أو اترك النوع "تلقائي" ليُحدَّد حسب تاريخ الاستحقاق</p>
      <div class="grid2" style="margin-bottom:18px">
        <div class="fld"><label>اختر المشترك</label><select onchange="msgSelSubId=this.value;render()">
          <option value="">(عام — بدون مشترك)</option>
          ${state.subs.map(s=>`<option value="${s.id}" ${msgSelSubId===s.id?'selected':''}>${esc(s.name)} — ${esc(s.code)}</option>`).join("")}
        </select></div>
        <div class="fld"><label>نوع الرسالة</label><select onchange="msgSelType=this.value;render()">
          ${Object.keys(typeLabels).map(k=>`<option value="${k}" ${msgSelType===k?'selected':''}>${typeLabels[k]}</option>`).join("")}
        </select></div>
      </div>
      ${sub && effType==="receipt" ? `<div class="grid2" style="margin-bottom:14px">
        <div class="fld"><label>المبلغ المسدد</label><input type="number" id="rcptAmount" value="${rcptAmount}" onchange="render()"></div>
        <div class="fld"><label>تاريخ التسديد</label><input type="date" id="rcptDate" value="${rcptDate}" onchange="render()"></div>
      </div>` : ""}
      ${sub && dLeft!==null ? `<div style="margin-bottom:14px">
        ${dLeft<0?`<span class="badge badge-red">⚠️ متأخر ${Math.abs(dLeft)} يوم عن الاستحقاق</span>`:""}
        ${dLeft>=0&&dLeft<=2?`<span class="badge badge-orange">🔔 الاستحقاق خلال ${dLeft} يوم</span>`:""}
        ${dLeft>2?`<span class="badge badge-sky">الاستحقاق بعد ${dLeft} يوم</span>`:""}
      </div>`:""}
      <div style="background:var(--skyBg);border:1px solid var(--border);border-radius:12px;padding:16px;font-size:13px;line-height:2;white-space:pre-wrap;margin-bottom:16px">${esc(txt)}</div>
      <a class="btn btn-wa" href="${link}" target="_blank">📤 ${sub?`إرسال لـ ${esc(sub.name)}`:"إرسال لرقم الشركة"}</a>
      ${sub?`<div style="margin-top:8px;font-size:12px;color:var(--sub)">رقم المشترك: ${esc(sub.wa)}</div>`:""}
      <div style="margin-top:14px;font-size:12px;color:var(--sub);line-height:1.8;padding:10px 13px;background:#C8601010;border-radius:10px;border:1px solid #C8601022">
        ⚡ هذا الملف ثابت (HTML) بدون خادم مجدوَل تلقائي؛ لإرسال آلي حقيقي على مدار الساعة تحتاج خادم صغير (مثلاً Firebase Cloud Functions) يفحص تواريخ الاستحقاق يومياً ويرسل عبر WhatsApp Business API.
      </div>
    </div>`;
}

            <div style="font-size:13px;color:var(--sub);margin-top:5px;line-height:1.8">📦 السلعة: ${esc(f.item)}<br>💵 السعر: ${fmt(f.price)}<br>📍 الموقع: ${esc(f.loc)}</div>
            <div style="margin-top:8px">
              ${f.status==="pending"?`<span class="badge badge-orange">⏳ قيد الانتظار</span>`:""}

              ${f.status==="rejected"?`<span class="badge badge-red">❌ مرفوض</span>`:""}

              <button class="btn btn-green" style="flex:1" onclick="approveFinancing('${f.id}')">✅ قبول وإرسال واتساب</button>

          </div>`:""}
          ${f.status==="rejected"&&f.reason?`<div style="font-size:12px;color:var(--red);margin-top:6px">السبب: ${esc(f.reason)}</div>`:""}

}
function approveFinancing(id){
  const f = state.financing.find(x=>x.id===id);
  f.status="approved"; saveState();
  const txt = `أهلاً بك ${f.name} 🌟\nيسعدنا إبلاغك بأن طلب تمويل (${f.item}) بقيمة ${fmt(f.price)} قد تم قبوله ✅\nسيتواصل معك موظفنا لإتمام إجراءات التقسيط.\nشكراً لثقتك بشركة قسطني 💙`;
  window.open(waHref(f.wa, txt), "_blank");
  render();
}
function rejectFinancing(id){
  const f = state.financing.find(x=>x.id===id);
  const reason = financingReasons[id] || "غير محدد";
  f.status="rejected"; f.reason=reason; saveState();
  const txt = `عزيزنا ${f.name}،\nنعتذر منك، تم الاعتذار عن طلب تمويل (${f.item}) لهذا السبب:\n${reason}\nيمكنك التواصل معنا لمزيد من التفاصيل أو تقديم طلب آخر.\nشكراً لتفهمك 🙏`;
  window.open(waHref(f.wa, txt), "_blank");
  render();
}

      <p style="font-size:13px;color:var(--sub);margin-bottom:18px">حدد نسبة الزيادة % لكل مدة — يمكن جعلها 0%. التغيير فوري بكل الموقع.</p>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:13px">
        ${[4,8,10,12].map(m=>`
          <div style="border:1.5px solid var(--border);border-radius:13px;padding:16px;text-align:center;background:var(--skyBg)">
            <div style="font-weight:900;color:var(--sky1);font-size:16px;margin-bottom:10px">⏱ ${m} أشهر</div>

  document.getElementById("markupEx"+m).textContent = fmt(1000000*(1+state.markup[m]/100));
}

function setHue(deg){ state.hue=deg; saveState(); applyTheme(); render(); }
function setBg(color){ state.bg=color; saveState(); applyTheme(); render(); }

/* ═══════════ التصيير الرئيسي ═══════════ */
function render(){
  renderChrome();
  const main = document.getElementById("main");
  if (currentTab==="home") main.innerHTML = renderHome();
  else if (currentTab==="calc") main.innerHTML = renderCalc();
  else if (currentTab==="lookup") main.innerHTML = renderLookup();
  else if (currentTab==="financing") main.innerHTML = renderFinancing();
  else if (currentTab==="wa") main.innerHTML = renderWA();
  else if (currentTab==="admin") main.innerHTML = authed ? renderAdmin() : renderAdminLogin();
  applyTheme();
}

loadState(()=>{ render(); });
</script>
